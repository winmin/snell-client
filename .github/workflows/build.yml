name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            name: linux-amd64
          - target: aarch64-unknown-linux-musl
            name: linux-arm64
          - target: armv7-unknown-linux-musleabihf
            name: linux-armv7
          - target: riscv64gc-unknown-linux-gnu
            name: linux-riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/snell-client" dist/
          chmod +x dist/snell-client
          cd dist && tar czf "../snell-client-${{ matrix.name }}.tar.gz" snell-client

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snell-client-${{ matrix.name }}
          path: snell-client-*.tar.gz

  build-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-amd64
          - target: aarch64-apple-darwin
            name: macos-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/snell-client" dist/
          chmod +x dist/snell-client
          cd dist && tar czf "../snell-client-${{ matrix.name }}.tar.gz" snell-client

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snell-client-${{ matrix.name }}
          path: snell-client-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/snell-client.exe dist/
          cd dist && 7z a ../snell-client-windows-amd64.zip snell-client.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snell-client-windows-amd64
          path: snell-client-windows-amd64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create checksums
        run: sha256sum snell-client-*.* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snell-client-*.*
            checksums.txt
          generate_release_notes: true
